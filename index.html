<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MDH Surgical Staffing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --primary:#4f8fcf;
      --primary-dark:#2f6fae;
      --primary-soft:#eef7ff;
      --primary-border:#c9e2f7;

      --green:#2f8f5b;
      --green-soft:#eaf8f0;
      --green-border:#ccebd9;

      --red:#b85c5c;
      --red-soft:#fff0f0;
      --red-border:#f2cdcd;

      --amber:#b9852f;
      --amber-soft:#fff8e8;
      --amber-border:#f3dfad;

      --purple:#7a69c7;
      --purple-soft:#f3f0ff;
      --purple-border:#ddd6ff;

      --grey:#6f7d8d;
      --grey-soft:#f5f7fa;
      --grey-border:#e5eaf0;

      --bg:#f7fafd;
      --card:#ffffff;
      --text:#243142;
      --muted:#718096;
      --border:#e1e8f0;
      --header:#f4faff;
      --shadow:0 10px 28px rgba(55,94,130,.08);
      --shadow-soft:0 3px 12px rgba(55,94,130,.06);
      --radius:16px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:"Inter",Arial,Helvetica,sans-serif;
      background:linear-gradient(180deg,#f3f9ff 0%,#f8fbfd 260px,#f7fafd 100%);
      color:var(--text);
      font-size:14px;
      letter-spacing:-.01em;
    }

    header{
      background:rgba(255,255,255,.86);
      color:var(--text);
      padding:16px 24px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      border-bottom:1px solid var(--border);
      backdrop-filter:blur(12px);
      position:sticky;
      top:0;
      z-index:10;
    }

    .brand{display:flex;flex-direction:column;gap:3px}
    .brand-title{font-weight:800;font-size:19px;color:#1f3f5f;letter-spacing:-.03em}
    .brand-subtitle{font-size:12px;color:var(--muted);font-weight:500}
    .top-user{text-align:right;font-size:12px;line-height:1.45;color:var(--muted)}
    .top-user strong{color:var(--text);font-weight:700}

    .container{max-width:1360px;margin:24px auto;padding:0 18px}

    .card{
      background:rgba(255,255,255,.94);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow-soft);
      padding:18px;
      margin-bottom:16px;
    }

    .login-wrap{max-width:440px;margin:78px auto}

    h1,h2,h3{margin:0 0 12px;color:#223449;letter-spacing:-.04em}
    h1{font-size:25px;font-weight:800}
    h2{font-size:20px;font-weight:800}
    h3{font-size:16px;font-weight:800}

    label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:700}

    input,select,textarea{
      width:100%;
      padding:11px 12px;
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
      font-size:14px;
      outline:none;
      color:var(--text);
      font-family:inherit;
      transition:border-color .15s ease,box-shadow .15s ease,background .15s ease;
    }

    input:focus,select:focus,textarea:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 4px rgba(79,143,207,.14);
      background:#fff;
    }

    button{
      border:0;
      border-radius:12px;
      padding:10px 15px;
      font-weight:800;
      cursor:pointer;
      background:var(--primary);
      color:#fff;
      font-family:inherit;
      box-shadow:0 4px 12px rgba(79,143,207,.20);
      transition:transform .12s ease,box-shadow .12s ease,background .12s ease;
    }

    button:hover{background:var(--primary-dark);box-shadow:0 6px 16px rgba(79,143,207,.26)}
    button:active{transform:translateY(1px)}
    button.secondary{background:#fff;color:var(--text);border:1px solid var(--border);box-shadow:none}
    button.secondary:hover{background:var(--grey-soft)}
    button.danger{background:var(--red);box-shadow:0 4px 12px rgba(184,92,92,.20)}
    button.success{background:var(--green);box-shadow:0 4px 12px rgba(47,143,91,.20)}
    button.small{padding:7px 10px;border-radius:10px;font-size:12px}
    button:disabled{opacity:.55;cursor:not-allowed}

    .grid{display:grid;gap:14px}
    .grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}

    .actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

    .tabs{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:16px;
      background:rgba(255,255,255,.72);
      border:1px solid var(--border);
      border-radius:18px;
      padding:8px;
      box-shadow:var(--shadow-soft);
    }

    .tab{
      background:transparent;
      color:var(--muted);
      border:1px solid transparent;
      padding:10px 12px;
      box-shadow:none;
    }

    .tab:hover{background:var(--primary-soft);color:var(--primary-dark);box-shadow:none}
    .tab.active{background:#fff;color:var(--primary-dark);border-color:var(--primary-border);box-shadow:0 4px 12px rgba(79,143,207,.10)}

    .stat-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}

    .stat{
      background:#fff;
      border:1px solid var(--border);
      border-radius:16px;
      padding:16px;
      box-shadow:var(--shadow-soft);
    }

    .stat-value{font-size:30px;font-weight:800;margin-bottom:5px;color:#1f3f5f;letter-spacing:-.05em}
    .stat-label{color:var(--muted);font-size:12px;font-weight:600}

    .badge{display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800;white-space:nowrap;border:1px solid transparent}
    .badge.green{background:var(--green-soft);color:var(--green);border-color:var(--green-border)}
    .badge.red{background:var(--red-soft);color:var(--red);border-color:var(--red-border)}
    .badge.amber{background:var(--amber-soft);color:var(--amber);border-color:var(--amber-border)}
    .badge.blue{background:var(--primary-soft);color:var(--primary-dark);border-color:var(--primary-border)}
    .badge.purple{background:var(--purple-soft);color:var(--purple);border-color:var(--purple-border)}
    .badge.grey{background:var(--grey-soft);color:var(--grey);border-color:var(--grey-border)}

    .table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:16px;background:#fff;box-shadow:var(--shadow-soft)}
    table{width:100%;border-collapse:collapse;min-width:760px}
    th,td{padding:11px 12px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top;font-size:13px}
    th{background:#f9fbfd;color:#536273;font-size:11px;text-transform:uppercase;letter-spacing:.05em;font-weight:800}
    tr:last-child td{border-bottom:0}
    tbody tr:hover{background:#fbfdff}

    .muted{color:var(--muted)}
    .hidden{display:none!important}

    .error{background:var(--red-soft);color:var(--red);border:1px solid var(--red-border);padding:11px 13px;border-radius:12px;margin:10px 0;white-space:pre-wrap;font-weight:600}
    .success-msg{background:var(--green-soft);color:var(--green);border:1px solid var(--green-border);padding:11px 13px;border-radius:12px;margin:10px 0;font-weight:600}
    .info{background:var(--primary-soft);color:var(--primary-dark);border:1px solid var(--primary-border);padding:11px 13px;border-radius:12px;margin:10px 0;font-weight:600}

    .ward-hero{
      background:linear-gradient(135deg,#ffffff 0%,#f0f8ff 100%);
      border-color:var(--primary-border);
    }

    .eyebrow{
      text-transform:uppercase;
      letter-spacing:.08em;
      font-size:11px;
      font-weight:900;
      color:var(--primary-dark);
      margin-bottom:5px;
    }

    .ward-name-big{
      font-size:34px;
      line-height:1.05;
      font-weight:900;
      color:#163555;
      letter-spacing:-.055em;
      margin-bottom:8px;
    }

    .ward-meta{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      color:var(--muted);
      font-weight:600;
    }

    .roster-table{min-width:1560px}
    .roster-table th:first-child,
    .roster-table td:first-child{
      min-width:270px;
      width:270px;
      max-width:330px;
      position:sticky;
      left:0;
      background:#fff;
      z-index:2;
      box-shadow:1px 0 0 var(--border);
    }

    .roster-table th:first-child{
      background:#f9fbfd;
      z-index:3;
    }

    .staff-name-main{font-weight:900;color:#223449;white-space:normal}
    .staff-name-sub{font-size:12px;color:var(--muted);margin-top:3px;font-weight:600}

    .shift-cell{display:inline-flex;justify-content:center;align-items:center;min-width:32px;height:27px;border-radius:9px;font-weight:900;font-size:12px;border:1px solid transparent}
    .shift-D,.shift-M,.shift-E{background:var(--primary-soft);color:var(--primary-dark);border-color:var(--primary-border)}
    .shift-N{background:#e7edff;color:#3857a6;border-color:#cfd9fb}
    .shift-O,.shift-R{background:var(--grey-soft);color:var(--grey);border-color:var(--grey-border)}
    .shift-AL{background:var(--amber-soft);color:var(--amber);border-color:var(--amber-border)}
    .shift-SL{background:var(--red-soft);color:var(--red);border-color:var(--red-border)}
    .shift-ML,.shift-ST{background:var(--purple-soft);color:var(--purple);border-color:var(--purple-border)}
    .shift-TI,.shift-TO,.shift-OT{background:var(--green-soft);color:var(--green);border-color:var(--green-border)}
    .override-dot{display:inline-block;width:7px;height:7px;border-radius:999px;background:var(--red);margin-left:5px;vertical-align:middle}

    .shift-click{
      background:transparent;
      color:inherit;
      box-shadow:none;
      padding:0;
      border-radius:9px;
      border:1px solid transparent;
      min-width:38px;
    }

    .shift-click:hover{
      background:var(--primary-soft);
      border-color:var(--primary-border);
      box-shadow:none;
    }

    .date-highlight{
      background:var(--amber-soft)!important;
      color:var(--amber)!important;
    }

    .form-panel{
      border:1px solid var(--primary-border);
      background:linear-gradient(180deg,#f8fcff 0%,#fff 100%);
      border-radius:16px;
      padding:16px;
      margin-top:14px;
    }

    .section-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }

    .bar-list{display:grid;gap:10px}
    .bar-row{display:grid;grid-template-columns:170px 1fr 50px;gap:10px;align-items:center}
    .bar-label{font-weight:700;color:#3a4858;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .bar-track{height:12px;border-radius:999px;background:var(--grey-soft);border:1px solid var(--grey-border);overflow:hidden}
    .bar-fill{height:100%;border-radius:999px;background:var(--primary)}
    .bar-value{text-align:right;font-weight:800;color:#1f3f5f}

    @media(max-width:850px){
      .grid-2,.grid-3,.grid-4,.stat-grid{grid-template-columns:1fr}
      header{align-items:flex-start;flex-direction:column}
      .top-user{text-align:left}
      .container{margin:16px auto;padding:0 12px}
      .bar-row{grid-template-columns:1fr}
      .bar-value{text-align:left}
      .ward-name-big{font-size:28px}
      .roster-table th:first-child,
      .roster-table td:first-child{position:static;min-width:240px}
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-title">MDH Surgical Staffing</div>
      <div class="brand-subtitle">Surgical wards staffing report system</div>
    </div>
    <div class="top-user" id="topUser">Not signed in</div>
  </header>

  <main class="container">
    <section id="loginScreen" class="login-wrap">
      <div class="card">
        <h1>Sign in</h1>
        <p class="muted">Use the Supabase test accounts created for this project.</p>
        <div id="loginMessage"></div>
        <div class="grid">
          <div><label>Email</label><input id="loginEmail" type="email" autocomplete="username" placeholder="name@example.com" /></div>
          <div><label>Password</label><input id="loginPassword" type="password" autocomplete="current-password" placeholder="Password" /></div>
          <button type="button" onclick="signIn()">Sign in</button>
        </div>
      </div>
    </section>

    <section id="appScreen" class="hidden">
      <div class="card">
        <div class="actions" style="justify-content:space-between">
          <div><h1 id="mainTitle">Dashboard</h1><div class="muted" id="mainSubtitle"></div></div>
          <div class="actions"><button class="secondary" type="button" onclick="reloadCurrentTab()">Refresh</button><button class="danger" type="button" onclick="signOut()">Sign out</button></div>
        </div>
      </div>
      <div class="tabs" id="tabs"></div>
      <div id="message"></div>
      <div id="content"></div>
    </section>
  </main>

  <script>
    const SUPABASE_URL_RAW = "https://dedcykelhdqwktkmkeiv.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_mdp0ij0wBpGmqwWnDtNKHA_TF1zNzvw";

    const SUPABASE_URL = SUPABASE_URL_RAW.replace(/\/rest\/v1\/?$/i, "").replace(/\/$/i, "");
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let appState = {
      session:null,
      ref:null,
      profile:null,
      wards:[],
      activeTab:null,
      selectedWardId:null,
      selectedDate:todayISO(),
      selectedMonth:monthISO(new Date()),
      highlightedDate:null,
      staffRows:[],
      dailyRosterRows:[],
      monthlyRosterRows:[],
      monthlyGroupedRows:[]
    };

    document.addEventListener("DOMContentLoaded", async () => {
      const { data } = await sb.auth.getSession();
      appState.session = data.session;
      sb.auth.onAuthStateChange((_event, session) => { appState.session = session; boot(); });
      await boot();
    });

    async function boot(){
      clearMessage();
      if(!appState.session){ showLogin(); return; }
      await loadReferenceData();
      showApp();
    }

    function showLogin(){
      document.getElementById("loginScreen").classList.remove("hidden");
      document.getElementById("appScreen").classList.add("hidden");
      document.getElementById("topUser").textContent = "Not signed in";
    }

    function showApp(){
      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("appScreen").classList.remove("hidden");

      const p = appState.profile;
      document.getElementById("topUser").innerHTML = `<strong>${escapeHtml(p.full_name)}</strong><br>${labelRole(p.role)}`;
      document.getElementById("mainTitle").textContent = p.is_sno ? "Senior Nursing Officer Dashboard" : "Ward Dashboard";
      document.getElementById("mainSubtitle").textContent = p.is_sno ? "All surgical wards overview" : wardAccessLabel();

      const validTabs = getTabs().map(t => t[0]);
      if(!appState.activeTab || !validTabs.includes(appState.activeTab)){
        appState.activeTab = p.is_sno ? "snoOverview" : "wardDaily";
      }

      buildTabs();
      renderTab(appState.activeTab);
    }

    async function loadReferenceData(){
      const { data, error } = await sb.rpc("get_app_reference_data");
      if(error){ showError(error.message); throw error; }

      appState.ref = data || {};
      appState.profile = data.profile;

      const rawWards = data.accessible_wards || data.wards || [];
      appState.wards = rawWards.map(w => ({
        ward_id:w.ward_id || w.id,
        ward_code:w.ward_code || w.code || "",
        ward_name:w.ward_name || w.name || ""
      })).filter(w => w.ward_id);

      if(appState.wards.length > 0){
        const stillValid = appState.wards.some(w => w.ward_id === appState.selectedWardId);
        if(!appState.selectedWardId || !stillValid) appState.selectedWardId = appState.wards[0].ward_id;
      }
    }

    function getTabs(){
      if(appState.profile?.is_sno){
        return [
          ["snoOverview","Today’s Overview"],
          ["monthlyRoster","Monthly Roster"],
          ["staffManagement","Staff Management"],
          ["relievingPool","Relieving Pool"],
          ["auditVisuals","Audit KPIs"],
          ["auditHistory","Audit History"],
          ["myAccount","My Account"]
        ];
      }

      return [
        ["wardDaily","Daily Staffing"],
        ["monthlyRoster","Monthly Roster"],
        ["staffManagement","My Ward Staff"],
        ["myAccount","My Account"]
      ];
    }

    function buildTabs(){
      const tabs = getTabs();
      document.getElementById("tabs").innerHTML = tabs.map(([key,label]) => `<button type="button" class="tab ${appState.activeTab===key?"active":""}" onclick="renderTab('${key}')">${label}</button>`).join("");
    }

    async function renderTab(tabKey){
      appState.activeTab = tabKey;
      buildTabs();
      clearMessage();
      document.getElementById("content").innerHTML = `<div class="card"><p class="muted">Loading...</p></div>`;

      try{
        if(tabKey==="snoOverview") await renderSnoOverview();
        else if(tabKey==="wardDaily") await renderWardDaily();
        else if(tabKey==="monthlyRoster") await renderMonthlyRoster();
        else if(tabKey==="staffManagement") await renderStaffManagement();
        else if(tabKey==="relievingPool") await renderRelievingPool();
        else if(tabKey==="auditVisuals") await renderAuditVisuals();
        else if(tabKey==="auditHistory") await renderAuditHistory();
        else if(tabKey==="myAccount") await renderMyAccount();
      }catch(err){
        showError(err.message || String(err));
      }
    }

    function reloadCurrentTab(){ renderTab(appState.activeTab); }

    async function signIn(){
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      setLoginMessage("");
      if(!email || !password){ setLoginMessage(`<div class="error">Enter email and password.</div>`); return; }
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if(error){ setLoginMessage(`<div class="error">${escapeHtml(error.message)}</div>`); return; }
    }

    async function signOut(){
      await sb.auth.signOut();
      appState = {
        session:null,ref:null,profile:null,wards:[],activeTab:null,
        selectedWardId:null,selectedDate:todayISO(),selectedMonth:monthISO(new Date()),
        highlightedDate:null,staffRows:[],dailyRosterRows:[],monthlyRosterRows:[],monthlyGroupedRows:[]
      };
      showLogin();
    }

    async function renderSnoOverview(){
      const date = appState.selectedDate;
      const { data, error } = await sb.rpc("get_sno_daily_overview", { p_staffing_date: date });
      if(error) throw error;

      const rows = data || [];
      const total = rows.length;
      const full = rows.filter(r=>r.ward_status==="fully_staffed").length;
      const short = rows.filter(r=>r.ward_status==="short_staffed").length;
      const not = rows.filter(r=>r.ward_status==="not_submitted").length;

      document.getElementById("content").innerHTML = `
        <div class="card">
          <div class="actions" style="justify-content:space-between">
            <div>
              <h2>Today’s Overview</h2>
              <p class="muted">All wards must submit daily staffing by 07:00.</p>
            </div>
            <div><label>Date</label><input type="date" value="${date}" onchange="setSelectedDate(this.value)"></div>
          </div>
        </div>

        <div class="stat-grid">
          ${statCard(total,"Total wards")}
          ${statCard(full,"Fully staffed")}
          ${statCard(short,"Short staffed")}
          ${statCard(not,"Not submitted")}
        </div>

        <div class="grid grid-3">
          ${rows.map(r=>`
            <div class="card">
              <div class="actions" style="justify-content:space-between">
                <h3>${escapeHtml(r.ward_code)}</h3>
                ${wardStatusBadge(r.ward_status)}
              </div>
              <p class="muted">${escapeHtml(r.ward_name)}</p>
              <table style="min-width:0">
                <tr><td>Required nurses</td><td><strong>${numberValue(r.required_nurses)}</strong></td></tr>
                <tr><td>Required carers/HCAs</td><td><strong>${numberValue(r.required_carers)}</strong></td></tr>
                <tr><td>Present nurses</td><td><strong>${numberValue(r.present_nurses)}</strong></td></tr>
                <tr><td>Present carers/HCAs</td><td><strong>${numberValue(r.present_carers) + numberValue(r.present_healthcare_assistants)}</strong></td></tr>
                <tr><td>Sick</td><td><strong>${numberValue(r.sick_total)}</strong></td></tr>
                <tr><td>Leave</td><td><strong>${numberValue(r.leave_total)}</strong></td></tr>
                <tr><td>Shortage</td><td><strong>${numberValue(r.total_shortage)}</strong></td></tr>
              </table>
            </div>
          `).join("")}
        </div>`;
    }

    async function renderWardDaily(){
      const wardId = requireSelectedWard();
      const date = appState.selectedDate;
      const ward = selectedWard();

      const [summaryResult, rosterResult] = await Promise.all([
        sb.rpc("get_ward_daily_dashboard", { p_ward_id: wardId, p_staffing_date: date }),
        sb.rpc("get_my_ward_roster_between", { p_ward_id: wardId, p_start_date: date, p_end_date: date })
      ]);

      if(summaryResult.error) throw summaryResult.error;
      if(rosterResult.error) throw rosterResult.error;

      const s = (summaryResult.data || [])[0];
      const roster = rosterResult.data || [];
      appState.dailyRosterRows = roster;

      if(!s){
        document.getElementById("content").innerHTML = `<div class="card"><div class="info">No dashboard summary returned for this ward/date.</div></div>`;
        return;
      }

      document.getElementById("content").innerHTML = `
        <div class="card ward-hero">
          <div class="actions" style="justify-content:space-between;align-items:flex-start">
            <div>
              <div class="eyebrow">Ward Dashboard</div>
              <div class="ward-name-big">${escapeHtml(ward?.ward_name || s.ward_name || "Selected Ward")}</div>
              <div class="ward-meta">
                <span>${escapeHtml(ward?.ward_code || s.ward_code || "")}</span>
                <span>•</span>
                <span>${escapeHtml(formatDate(date))}</span>
                <span>•</span>
                <span>Daily staffing report</span>
              </div>
            </div>
            <div class="actions">${wardSelectorHtml()}<div><label>Date</label><input type="date" value="${date}" onchange="setSelectedDate(this.value)"></div></div>
          </div>

    async function addStaffMember(){
      clearMessage();

      const name = document.getElementById("newStaffName").value.trim();
      const corp = document.getElementById("newStaffCorp").value.trim();
      const role = document.getElementById("newStaffRole").value;
      const assignment = parseRosterAssignment(document.getElementById("newStaffRosterAssignment").value);

      if(!name){ showError("Full name is required."); return; }
      if(!corp){ showError("Corp user ID is required."); return; }
      if(!role){ showError("Role is required."); return; }
      if(!assignment.type){ showError("Roster assignment is required."); return; }

      const payload = {
        p_full_name:name,
        p_corp_user_id:corp,
        p_email:document.getElementById("newStaffEmail").value.trim() || null,
        p_role:role,
        p_home_ward_id:appState.selectedWardId,
        p_roster_group_template_id:null,
        p_roster_group_code:assignment.type === "group" ? assignment.code : null,
        p_roster_pattern_id:null,
        p_roster_pattern_code:assignment.type === "pattern" ? assignment.code : null,
        p_roster_start_date:document.getElementById("newStaffStartDate").value || null,
        p_roster_group:null,
        p_employment_type:null
      };

      const { error } = await sb.rpc("create_ward_staff_member", payload);
      if(error){ showError(error.message); return; }

      showSuccess("Staff member added successfully.");
      await renderStaffManagement();
    }

    function startEditStaff(staffId){
      clearMessage();

      const staff = appState.staffRows.find(s => String(s.id || s.staff_id) === String(staffId));
      if(!staff){ showError("Could not find staff member in the current table."); return; }

      document.getElementById("editStaffPanel").classList.remove("hidden");
      document.getElementById("editStaffId").value = staff.id || staff.staff_id;
      document.getElementById("editStaffName").value = staff.full_name || "";
      document.getElementById("editStaffCorp").value = staff.corp_user_id || "";
      document.getElementById("editStaffEmail").value = staff.email || "";
      document.getElementById("editStaffRole").value = staff.role || "nurse";
      document.getElementById("editStaffRosterAssignment").value = rosterAssignmentValueFromStaff(staff);
      document.getElementById("editStaffStartDate").value = dateOnly(staff.roster_start_date) || "";

      document.getElementById("editStaffPanel").scrollIntoView({ behavior:"smooth", block:"start" });
    }

    function cancelEditStaff(){
      document.getElementById("editStaffPanel").classList.add("hidden");
      document.getElementById("editStaffId").value = "";
    }

    async function updateStaffMember(){
      clearMessage();

      const payload = {
        p_staff_id:staffId,
        p_full_name:document.getElementById("editStaffName").value.trim(),
        p_corp_user_id:document.getElementById("editStaffCorp").value.trim(),
        p_email:document.getElementById("editStaffEmail").value.trim() || null,

        p_roster_start_date:document.getElementById("editStaffStartDate").value || null,

    async function deactivateStaffMember(staffId, staffName){
      clearMessage();

      const confirmed = window.confirm(`Deactivate ${staffName}?\n\nThis is a safe delete. It will hide the staff member from active lists but preserve history.`);
      if(!confirmed) return;

      const reason = window.prompt("Reason for deactivation:", "Removed from ward complement");
      if(reason === null) return;

      const { error } = await sb.rpc("deactivate_ward_staff_member", {
        p_staff_id:staffId,
        p_reason:reason || "Removed from ward complement"
      });

      if(error){ showError(error.message); return; }

      showSuccess("Staff member deactivated successfully.");
      await renderStaffManagement();
    }

        </div>`;
    }

    function openShiftEditor(staffId, shiftDate, context){
      clearMessage();

      const rows = context === "daily" ? appState.dailyRosterRows : appState.monthlyRosterRows;
      let row = rows.find(r => String(r.staff_id) === String(staffId) && dateOnly(r.shift_date) === shiftDate);
      let staff = null;

      if(context === "monthly"){
        staff = appState.monthlyGroupedRows.find(s => String(s.staff_id) === String(staffId));
      }

      if(!row && staff){
        row = {
          staff_id:staff.staff_id,
          full_name:staff.full_name,
          role:staff.role,
          live_shift_code:"",
          baseline_shift_code:"",
          override_reason:""
        };
      }

      if(!row){
        row = rows.find(r => String(r.staff_id) === String(staffId));
      }

      if(!row){
        showError("Could not find this staff/date row.");
        return;
      }

      const panel = document.getElementById("shiftEditPanel");
      const code = row.live_shift_code || row.baseline_shift_code || "D";

      document.getElementById("shiftEditStaffId").value = staffId;
      document.getElementById("shiftEditDate").value = shiftDate;
      document.getElementById("shiftEditContext").value = context;
      document.getElementById("shiftEditCode").innerHTML = shiftOptionsHtml(code);
      document.getElementById("shiftEditReasonPreview").value = labelOverrideReason(reasonFromShiftCode(code));
      document.getElementById("shiftEditDateDisplay").value = formatDate(shiftDate);
      document.getElementById("shiftEditNotes").value = "";

      document.getElementById("shiftEditTitle").textContent = `Change status — ${displayStaffName(row.full_name)}`;
      document.getElementById("shiftEditSubtitle").textContent = `${labelRole(row.role)} • ${formatDate(shiftDate)} • current: ${code || "—"}`;

      document.getElementById("shiftEditCode").onchange = function(){
        document.getElementById("shiftEditReasonPreview").value = labelOverrideReason(reasonFromShiftCode(this.value));
      };

      panel.classList.remove("hidden");
      panel.scrollIntoView({behavior:"smooth", block:"start"});
    }

    function closeShiftEditor(){
      const panel = document.getElementById("shiftEditPanel");
      if(panel) panel.classList.add("hidden");
    }

    async function saveShiftEdit(){
      clearMessage();

      const staffId = document.getElementById("shiftEditStaffId").value;
      const shiftDate = document.getElementById("shiftEditDate").value;
      const context = document.getElementById("shiftEditContext").value;
      const code = document.getElementById("shiftEditCode").value;
      const notes = document.getElementById("shiftEditNotes").value.trim();

      if(!staffId || !shiftDate || !code){
        showError("Staff, date and status are required.");
        return;
      }

      const { error } = await sb.rpc("upsert_ward_roster_override", {
        p_ward_id:appState.selectedWardId,
        p_staff_id:staffId,
        p_shift_date:shiftDate,
        p_shift_code:code,
        p_override_reason:reasonFromShiftCode(code),
        p_notes:notes || `Changed to ${code} from frontend`
      });

      if(error){
        showError(error.message);
        return;
      }

      closeShiftEditor();
      showSuccess("Status changed successfully.");

      if(context === "daily") await renderWardDaily();
      else await renderMonthlyRoster();
    }

    function shiftOptionsHtml(selected=""){
      const order = ["D","N","M","E","O","R","AL","SL","ML","ST","TI","TO","OT"];
      const ref = appState.ref?.shift_types || [];
      const byCode = new Map(ref.map(s => [String(s.shift_code || "").toUpperCase(), s]));

      return order.map(code => {
        const item = byCode.get(code);
        const label = item?.shift_name ? `${code} — ${item.shift_name}` : `${code} — ${fallbackShiftName(code)}`;
        return `<option value="${escapeHtml(code)}" ${String(selected).toUpperCase()===code ? "selected" : ""}>${escapeHtml(label)}</option>`;
      }).join("");
    }

    function reasonFromShiftCode(code){
      const c = String(code || "").toUpperCase();
      if(c === "AL") return "annual_leave";
      if(c === "SL") return "sick_leave";
      if(c === "ML") return "maternity_leave";
      if(c === "ST") return "study_leave";
      if(c === "TI") return "til_in";
      if(c === "TO") return "til_out";
      if(c === "OT") return "overtime";
      return "duty_change";
    }

    function fallbackShiftName(code){
      const labels = {
        D:"Day shift",
        N:"Night shift",
        M:"Morning shift",
        E:"Evening shift",
        O:"Off day",
        R:"Rest day",
        AL:"Annual leave",
        SL:"Sick leave",
        ML:"Maternity leave",
        ST:"Study leave",
        TI:"TIL in",
        TO:"TIL out",
        OT:"Overtime"
      };
      return labels[code] || code;
    }

    function labelOverrideReason(reason){
      const labels = {
        annual_leave:"Annual leave",
        correction:"Correction",
        duty_change:"Duty change",
        manual_change:"Manual change",
        maternity_leave:"Maternity leave",
        other:"Other",
        overtime:"Overtime",
        sick_leave:"Sick leave",
        study_leave:"Study leave",
        til_in:"TIL in",
        til_out:"TIL out"
      };
      return labels[reason] || reason || "—";
    }

    function setSelectedDate(value){ appState.selectedDate=value; renderTab(appState.activeTab); }
    function setSelectedMonth(value){ appState.selectedMonth=value; renderTab(appState.activeTab); }
    function setSelectedWard(value){ appState.selectedWardId=value; renderTab(appState.activeTab); }

    function jumpMonthlyDate(value){
      if(!value) return;
      appState.highlightedDate = value;
      appState.selectedMonth = value.slice(0,7);
      renderMonthlyRoster();
    }

    function filterMonthlyRosterRows(value){
      const q = String(value || "").trim().toLowerCase();
      document.querySelectorAll(".monthly-roster-row").forEach(row => {
        const hay = row.getAttribute("data-search") || "";
        row.style.display = hay.includes(q) ? "" : "none";
      });
    }

    function wardSelectorHtml(){
      if(!appState.profile?.is_sno && appState.wards.length<=1) return "";

      return `
        <div>
          <label>Ward</label>
          <select onchange="setSelectedWard(this.value)">
            ${appState.wards.map(w=>`
              <option value="${escapeHtml(w.ward_id)}" ${w.ward_id===appState.selectedWardId?"selected":""}>
                ${escapeHtml(w.ward_code)}${w.ward_name ? ` — ${escapeHtml(w.ward_name)}` : ""}
              </option>
            `).join("")}
          </select>
        </div>`;
    }

    function roleSelectHtml(id, selected="nurse"){
      const options = [
        ["nurse","Staff Nurse"],
        ["carer","Carer"],
        ["healthcare_assistant","Healthcare Assistant"],
        ["other","Other"]
      ];

      if(appState.profile?.is_sno){
        options.splice(1, 0, ["charge_nurse","Charge Nurse"]);
      }

      return `<select id="${escapeHtml(id)}">${options.map(([value,label]) => `<option value="${value}" ${value===selected?"selected":""}>${escapeHtml(label)}</option>`).join("")}</select>`;
    }

    function rosterAssignmentSelectHtml(id, selected=""){
      const groupOptions = rosterGroupTemplates().map(t => {
        const code = templateCode(t);
        const label = templateLabel(t);
        return `<option value="group:${escapeHtml(code)}" ${selected===`group:${code}`?"selected":""}>${escapeHtml(label)}</option>`;
      }).join("");

      const patternOptions = rosterPatterns().map(p => {
        const code = patternCode(p);
        const label = patternLabel(p);
        return `<option value="pattern:${escapeHtml(code)}" ${selected===`pattern:${code}`?"selected":""}>${escapeHtml(label)}</option>`;
      }).join("");

      return `
        <select id="${escapeHtml(id)}">
          <option value="">Select roster...</option>
          <optgroup label="Mandatory hospital roster groups">
            ${groupOptions}
          </optgroup>
          <optgroup label="Special day-only patterns">
            ${patternOptions}
          </optgroup>
        </select>`;
    }

    function parseRosterAssignment(value){
      if(!value) return { type:null, code:null };
      const idx = value.indexOf(":");
      if(idx < 0) return { type:null, code:null };
      return { type:value.slice(0, idx), code:value.slice(idx + 1) };
    }

    function rosterAssignmentValueFromStaff(staff){
      if(staff.roster_group_template_id){
        const template = rosterGroupTemplates().find(t => String(t.id) === String(staff.roster_group_template_id));
        if(template) return `group:${templateCode(template)}`;
      }

      const groupCode = staff.roster_code || staff.roster_name || staff.roster_group;
      if(looksLikeMandatoryRoster(groupCode)){
        const template = rosterGroupTemplates().find(t => sameRoster(templateCode(t), groupCode) || sameRoster(templateLabel(t), groupCode));
        if(template) return `group:${templateCode(template)}`;
        return `group:${groupCode}`;
      }

      if(staff.roster_pattern_code) return `pattern:${staff.roster_pattern_code}`;
      return "";
    }

    function rosterGroupTemplates(){
      const items = appState.ref?.roster_group_templates || [];
      if(items.length) return items;

      return [
        { roster_code:"ROSTER_1", roster_name:"Roster 1" },
        { roster_code:"ROSTER_2", roster_name:"Roster 2" },
        { roster_code:"ROSTER_3", roster_name:"Roster 3" },
        { roster_code:"ROSTER_4", roster_name:"Roster 4" },
        { roster_code:"ROSTER_5", roster_name:"Roster 5" }
      ];
    }

    function rosterPatterns(){
      const allowed = new Set(["DDOO","DDODO","DDDOO"]);
      return (appState.ref?.roster_patterns || [])
        .filter(p => allowed.has(patternCode(p)));
    }

    function templateCode(t){ return t.roster_code || t.code || t.roster_name || t.name || ""; }
    function templateLabel(t){ return t.roster_name || t.name || formatRosterCode(t.roster_code || t.code) || ""; }
    function patternCode(p){ return String(p.pattern_code || p.code || "").toUpperCase(); }
    function patternLabel(p){
      const code = patternCode(p);
      const name = p.pattern_name || p.name || "";
      return name ? `${code} — ${name}` : code;
    }

    function staffRosterLabel(staff){
      if(staff.roster_name) return formatRosterCode(staff.roster_name);
      if(staff.roster_code) return formatRosterCode(staff.roster_code);
      if(staff.roster_group) return formatRosterCode(staff.roster_group);
      if(staff.roster_pattern_code) return staff.roster_pattern_code;
      if(staff.pattern_code) return staff.pattern_code;
      return "—";
    }

    function sameRoster(a,b){
      return normalizeRoster(a) === normalizeRoster(b);
    }

    function normalizeRoster(value){
      return String(value || "").toLowerCase().replace(/[\s_\-]/g,"");
    }

    function looksLikeMandatoryRoster(value){
      const v = normalizeRoster(value);
      return ["roster1","roster2","roster3","roster4","roster5","r1","r2","r3","r4","r5"].includes(v);
    }

    function formatRosterCode(value){
      const v = String(value || "");
      const match = v.match(/^ROSTER[_\s-]*(\d+)$/i);
      if(match) return `Roster ${match[1]}`;
      return v;
    }

    function canShowDeactivateButton(staff){
      if(!truthy(staff.is_active)) return false;
      if(staff.role === "sno") return false;
      if(staff.role === "charge_nurse" && !appState.profile?.is_sno) return false;
      return true;
    }

    function requireSelectedWard(){
      if(!appState.selectedWardId){
        throw new Error("No ward selected or no ward access was returned for this account.");
      }
      return appState.selectedWardId;
    }

    function selectedWard(){
      return appState.wards.find(w => w.ward_id === appState.selectedWardId) || null;
    }

    function wardAccessLabel(){
      if(!appState.wards.length) return "No ward access returned";
      return `Access: ${appState.wards.map(w => w.ward_name ? `${w.ward_name} (${w.ward_code})` : w.ward_code).join(", ")}`;
    }

    function statCard(value,label){
      return `<div class="stat"><div class="stat-value">${numberValue(value)}</div><div class="stat-label">${escapeHtml(label)}</div></div>`;
    }

    function barCard(title, counts){
      const entries = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,8);
      const max = entries.length ? Math.max(...entries.map(e=>e[1])) : 1;

      return `
        <div class="card">
          <h3>${escapeHtml(title)}</h3>
          <div class="bar-list">
            ${entries.map(([label,value]) => `
              <div class="bar-row">
                <div class="bar-label" title="${escapeHtml(label)}">${escapeHtml(label)}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${Math.max(3, Math.round((value/max)*100))}%"></div></div>
                <div class="bar-value">${value}</div>
              </div>
            `).join("") || `<p class="muted">No data.</p>`}
          </div>
        </div>`;
    }

    function countBy(rows, fn){
      const out = {};
      for(const row of rows){
        const key = String(fn(row) || "Unknown");
        out[key] = (out[key] || 0) + 1;
      }
      return out;
    }

    function badge(text,colour){ return `<span class="badge ${colour}">${escapeHtml(text)}</span>`; }

    function wardStatusBadge(status){
      if(status==="fully_staffed")return badge("Fully staffed","green");
      if(status==="short_staffed")return badge("Short staffed","red");
      if(status==="not_submitted")return badge("Not submitted","amber");
      return badge(status||"Unknown","grey");
    }

    function statusBadge(status){
      if(status==="open")return badge("Open","amber");
      if(status==="reviewed")return badge("Reviewed","blue");
      if(status==="partially_filled")return badge("Partially filled","purple");
      if(status==="filled")return badge("Filled","green");
      if(status==="cancelled")return badge("Cancelled","grey");
      return badge(status||"Unknown","grey");
    }

    function shiftBadge(code){
      if(!code) return `<span class="shift-cell shift-O">—</span>`;
      return `<span class="shift-cell shift-${escapeHtml(code)}">${escapeHtml(code)}</span>`;
    }

    function legend(code,label){ return `<span>${shiftBadge(code)} <span class="muted">${escapeHtml(label)}</span></span>`; }

    function showError(message){ document.getElementById("message").innerHTML=`<div class="error">${escapeHtml(message)}</div>`; }
    function showSuccess(message){ document.getElementById("message").innerHTML=`<div class="success-msg">${escapeHtml(message)}</div>`; }
    function clearMessage(){ document.getElementById("message").innerHTML=""; }
    function setLoginMessage(html){ document.getElementById("loginMessage").innerHTML=html; }

    function groupRosterByStaff(rows){
      const map=new Map();

      for(const row of rows){
        if(!map.has(row.staff_id)){
          map.set(row.staff_id,{
            staff_id:row.staff_id,
            full_name:row.full_name,
            role:row.role,
            roster_group:row.roster_group,
            roster_code:row.roster_code,
            roster_name:row.roster_name,
            roster_pattern_code:row.roster_pattern_code,
            days:{}
          });
        }
        map.get(row.staff_id).days[dateOnly(row.shift_date)]=row;
      }

      return Array.from(map.values()).sort((a,b)=>{
        const ga=staffRosterLabel(a), gb=staffRosterLabel(b);
        if(ga!==gb)return ga.localeCompare(gb);
        return displayStaffName(a.full_name || "").localeCompare(displayStaffName(b.full_name || ""));
      });
    }

    function displayStaffName(name){
      let out = String(name || "").trim();

      const codes = appState.wards.map(w => w.ward_code).filter(Boolean).sort((a,b)=>b.length-a.length);
      for(const code of codes){
        out = out.replace(new RegExp("^" + escapeRegExp(code) + "[\\s\\-_:]+","i"), "");
      }

      out = out.replace(/^Surgical\s+Ward\s+\d+\s*[\-_:]+\s*/i, "");
      out = out.replace(/^Surgical\s+Assessment\s+Unit\s+\d+\s*[\-_:]+\s*/i, "");
      return out.trim();
    }

    function monthRange(monthValue){
      const [year,month]=monthValue.split("-").map(Number);
      const startDate=new Date(year,month-1,1);
      const endDate=new Date(year,month,0);
      const days=[];
      const cursor=new Date(startDate);

      while(cursor<=endDate){
        days.push(new Date(cursor));
        cursor.setDate(cursor.getDate()+1);
      }

      return {start:isoFromDate(startDate),end:isoFromDate(endDate),days};
    }

    function todayISO(){ return isoFromDate(new Date()); }
    function monthISO(date){ const y=date.getFullYear(); const m=String(date.getMonth()+1).padStart(2,"0"); return `${y}-${m}`; }
    function isoFromDate(date){ const y=date.getFullYear(); const m=String(date.getMonth()+1).padStart(2,"0"); const d=String(date.getDate()).padStart(2,"0"); return `${y}-${m}-${d}`; }
    function dateOnly(value){ if(!value) return ""; return String(value).slice(0,10); }
    function formatDate(value){ if(!value)return""; const [y,m,d]=String(value).split("-"); return `${d}/${m}/${y}`; }
    function formatDateTime(value){ if(!value)return""; const dt=new Date(value); return dt.toLocaleString("en-GB",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}); }
    function weekdayShort(date){ return date.toLocaleDateString("en-GB",{weekday:"short"}); }

    function labelRole(role){
      const labels={
        sno:"Senior Nursing Officer",
        charge_nurse:"Charge Nurse",
        nurse:"Staff Nurse",
        carer:"Carer",
        healthcare_assistant:"Healthcare Assistant",
        other:"Other"
      };
      return labels[role]||role||"";
    }

    function labelEmployment(value){
      const labels={core:"Core",relieving_pool:"Relieving Pool",external_overtime:"External Overtime",agency:"Agency",other:"Other"};
      return labels[value]||value||"";
    }

    function numberValue(value){
      const n = Number(value);
      return Number.isFinite(n) ? n : 0;
    }

    function truthy(value){
      return value === true || value === "true" || value === 1 || value === "1";
    }

    function escapeRegExp(value){
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function escapeHtml(value){
      return String(value??"")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }
  </script>
</body>
